<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍舟划槳動作示範</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1C2B4A;
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  color: #fff; user-select: none;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
  padding: 28px 16px 48px;
  display: flex; flex-direction: column; align-items: center;
}
.wrap { width: 100%; max-width: 620px; display: flex; flex-direction: column; align-items: center; }

h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; text-align: center; }
h1 small { display: block; font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.55); margin-top: 6px; letter-spacing: 0; }

.section-label {
  align-self: stretch; display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 700; color: #F0C040; margin: 26px 0 12px;
}

.card {
  background: #f8f9fb; border-radius: 12px; overflow: hidden; position: relative;
  width: 100%; max-width: 600px; aspect-ratio: 600 / 330;
}
.card canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

.progress-bar {
  margin-top: 12px; width: 100%; max-width: 600px; height: 4px;
  background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden;
}
.progress-fill { height: 100%; background: #F0C040; border-radius: 2px; }

.info { margin-top: 16px; text-align: center; width: 100%; max-width: 600px; }
.phase-name { font-size: 20px; font-weight: 700; color: #F0C040; min-height: 28px; }
.phase-cue  { margin-top: 7px; font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.7; white-space: pre-line; }

.controls { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.btn {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
  color: #fff; padding: 10px 20px; border-radius: 22px;
  cursor: pointer; font-size: 14px; transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: rgba(255,255,255,0.16); }
.btn.on { background: rgba(240,192,64,0.18); border-color: #F0C040; color: #F0C040; }

.speed { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 600px; margin-top: 16px; }
.speed-lbl { flex: 0 0 auto; font-size: 13px; color: rgba(255,255,255,0.6); }
.speed input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); outline: none;
}
.speed input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%; background: #F0C040; cursor: pointer; border: none;
}
.speed input[type=range]::-moz-range-thumb {
  width: 24px; height: 24px; border-radius: 50%; background: #F0C040; cursor: pointer; border: none;
}

/* ── 說明區塊 ── */
.guide {
  align-self: stretch; margin-top: 30px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 14px; padding: 20px 20px 22px;
}
.guide h2 { font-size: 17px; font-weight: 800; margin-bottom: 14px; }

.step { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 15px; line-height: 1.6; }
.step:last-child { border-bottom: none; padding-bottom: 0; }
.step .k { flex: 0 0 52px; font-weight: 800; color: #F0C040; }
.step .v { flex: 1; color: rgba(255,255,255,0.86); }

.check { display: flex; flex-wrap: wrap; gap: 6px 12px; padding: 12px 14px; border-radius: 10px; font-size: 14.5px; line-height: 1.6; margin-bottom: 10px; }
.check .tag { font-weight: 800; flex: 0 0 auto; }
.check .txt { color: rgba(255,255,255,0.86); }
.check.ok  { background: rgba(80,200,120,0.12); border: 1px solid rgba(80,200,120,0.35); }
.check.ok .tag { color: #5fd18a; }
.check.bad { background: rgba(230,90,90,0.12); border: 1px solid rgba(230,90,90,0.35); }
.check.bad .tag { color: #f08a8a; }

.mnemonic { margin-top: 14px; text-align: center; padding: 18px 16px; border-radius: 12px; background: rgba(240,192,64,0.12); border: 1px dashed rgba(240,192,64,0.5); }
.mnemonic .label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
.mnemonic .phrase { font-size: 19px; font-weight: 800; color: #F0C040; letter-spacing: 0.5px; line-height: 1.6; word-break: break-word; }
</style>
</head>
<body>
<div class="wrap">
  <h1>龍舟划槳動作示範<small>動作分解 × 船上實做重點</small></h1>

  <div class="section-label">動作分解動畫</div>
  <div class="card">
    <canvas id="c" width="600" height="330"></canvas>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="info">
    <div class="phase-name" id="phaseName">預備入水</div>
    <div class="phase-cue"  id="phaseCue"></div>
  </div>
  <div class="controls">
    <button class="btn" id="btnPlay" onclick="togglePlay()">⏸ 暫停</button>
  </div>
  <div class="speed">
    <span class="speed-lbl">慢</span>
    <input type="range" id="spd" min="1" max="12" value="3" step="1"
           aria-label="動畫速度" oninput="onSpeed(this.value)">
    <span class="speed-lbl">快</span>
  </div>

  <section class="guide">
    <h2>船上實做版</h2>
    <div class="step"><div class="k">入水</div><div class="v">槳葉先插滿，先別急著拉</div></div>
    <div class="step"><div class="k">發力</div><div class="v">腳先頂、腰一起轉、背一起帶</div></div>
    <div class="step"><div class="k">出水</div><div class="v">拉到大腿或髖旁就出水，不要拖太後面</div></div>
  </section>

  <section class="guide">
    <h2>發力・自我檢查口訣</h2>
    <div class="check ok"><span class="tag">✓ 對的感覺</span><span class="txt">腿有頂到、側腰有轉到、背有出力</span></div>
    <div class="check bad"><span class="tag">✗ 錯的感覺</span><span class="txt">手先爆酸、肩膀聳起來、上手亂晃</span></div>
    <div class="mnemonic">
      <div class="label">口訣直接背</div>
      <div class="phrase">插滿水，先蹬腿，<br>轉腰背帶，手最後</div>
    </div>
  </section>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

/* ─── 關鍵影格資訊 ─────────────────────────────── */
const KF = [
  { name:'A 字框架',
    cue:'下背打直・身體向前延伸・肩膀推前呈側身\n前手置於前方肩高，形成 A 字框架\n框架穩定支撐，核心撐住' },
  { name:'準備入槳抓水',
    cue:'垂直加速度・用身體入水\n入水快、狠、準——快速垂直入水\n產生大面積阻力，將動能轉為推力' },
  { name:'槳要插深',
    cue:'深度 ∝ 阻力 ∝ 推力\n槳葉越深，反作用阻力越大，推力越強\n短時間高加速，需較深的抓水' },
  { name:'回槳放鬆',
    cue:'回槳不外開・避免阻水\n放鬆回位，準備下一次入水' },
];
const N = KF.length;

/* ─── 錨點：屁股在 canvas 上的固定位置 ──────────
   依使用者截圖標記校準（343, 255）
   ─────────────────────────────────────────────── */
const ANCHOR = { x: 400, y: 258 };

/* ─── 各圖的屁股位置（相對比例）─────────────────
   rx = 屁股在原圖的 x 佔總寬比例
   ry = 屁股在原圖的 y 佔總高比例
   新圖初始目測值，需校準
   ─────────────────────────────────────────────── */
const HIP = [
  { rx: 0.95, ry: 0.659 },  // pose_1  錨點→髖骨
  { rx: 0.84, ry: 0.660 },   // pose_2  校準完成
  { rx: 0.86, ry: 0.565 },   // pose_3  校準完成
  { rx: 0.75, ry: 0.589 },   // pose_4  校準完成
];

/* ─── 縮放比例（per-image，以高度為基準）────────
   pose_1 前傾幅度最大，人物垂直跨度較短，需放大補足
   ─────────────────────────────────────────────── */
const DISPLAY_H = [420, 300, 300, 300];

/* ─── 每幀靜止比例 ───────────────────────────────
   0.5 = 50% 靜止展示 + 50% crossfade
   調高讓每個姿勢停留更久；調低讓動畫更流暢
   ─────────────────────────────────────────────── */
const HOLD = 0.5;

/* ─── 載入圖片 ─────────────────────────────────── */
const SRCS = [
  'pose_1_red_black_hd.png',
  'pose_2_red_black_hd.png',
  'pose_3_red_black_hd.png',
  'pose_4_lower_hand_left_up_hd.png',
];
const imgs = SRCS.map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

/* ─── easing ──────────────────────────────────── */
const smooth = t => t * t * (3 - 2 * t);

/* ─── 錨點對齊繪圖 ─────────────────────────────── */
function drawImg(img, hip, alpha, dispH) {
  if (!img || !img.complete || !img.naturalHeight) return;
  const scale = dispH / img.naturalHeight;
  const dw = img.naturalWidth  * scale;
  const dh = img.naturalHeight * scale;
  // 位移：讓屁股對齊 ANCHOR
  const ox = ANCHOR.x - hip.rx * dw;
  const oy = ANCHOR.y - hip.ry * dh;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, ox, oy, dw, dh);
  ctx.restore();
}

/* ─── 主繪製 ───────────────────────────────────── */
function draw(p) {
  const raw  = ((p % 1) + 1) % 1 * N;
  const ci   = Math.floor(raw) % N;
  const ni   = (ci + 1) % N;
  const frac = raw - ci;  // 0~1：這一幀內的進度

  // 靜止 → crossfade 兩段 alpha
  let alphaCi, alphaNi;
  if (frac <= HOLD) {
    alphaCi = 1;           // 靜止：只顯示 ci
    alphaNi = 0;
  } else {
    const t = smooth((frac - HOLD) / (1 - HOLD));  // crossfade 0→1
    alphaCi = 1 - t;
    alphaNi = t;
  }

  // 白底
  ctx.fillStyle = '#f8f9fb';
  ctx.fillRect(0, 0, W, H);

  // 錨點對齊溶接
  drawImg(imgs[ci], HIP[ci], alphaCi, DISPLAY_H[ci]);
  drawImg(imgs[ni], HIP[ni], alphaNi, DISPLAY_H[ni]);

  // 文字：靜止期 = ci；crossfade 過半才切換到 ni
  const di = frac > HOLD + (1 - HOLD) * 0.5 ? ni : ci;
  document.getElementById('phaseName').textContent = KF[di].name;
  document.getElementById('phaseCue').textContent  = KF[di].cue;
  document.getElementById('progFill').style.width  = (((p%1)+1)%1 * 100).toFixed(1) + '%';
}

/* ─── 動畫迴圈 ─────────────────────────────────── */
let progress=0, speed=0.003, playing=true, lastTs=null;

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min(ts - lastTs, 50) / 1000; lastTs = ts;
  if (playing) progress = (progress + speed * dt * 60) % 1;
  draw(progress);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ─── 控制項 ───────────────────────────────────── */
const btnPlay = document.getElementById('btnPlay');

function togglePlay() {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸ 暫停' : '▶ 播放';
}
function onSpeed(v) {
  speed = v * 0.001;   // 滑桿 1~12 → 每幀 0.001~0.012
}
document.addEventListener('keydown', e => {
  if (e.key === ' ')          { togglePlay(); e.preventDefault(); }
  if (e.key === 'ArrowRight') progress = (progress + 0.25) % 1;
  if (e.key === 'ArrowLeft')  progress = ((progress - 0.25) + 1) % 1;
});
</script>
</body>
</html>
